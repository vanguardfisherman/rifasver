<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Plataforma de rifas en linea. Compra tus numeros y gana increibles premios." />
  <meta name="theme-color" content="#060a13" />
  <title>Plataforma de Rifas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <h1><span class="hero-icon">🎟</span>Rifasver</h1>
      <p>Compra tus numeros y gana <span class="live-badge">En vivo</span></p>
    </div>
    <nav>
      <a href="/">Inicio</a>
      <a href="/admin">Admin</a>
    </nav>
  </header>

  <main>
    <!-- PRODUCT SPOTLIGHT -->
    <section class="panel wide spotlight product-layout">
      <div class="product-left">
        <div>
          <h2 id="raffleTitle">Rifas activas</h2>
          <select id="raffleSelect" aria-label="Seleccionar rifa"></select>
        </div>
        <p id="raffleInfo"></p>
        <div id="subprizes" class="subprizes" aria-label="Subpremios"></div>

        <div class="image-wrap">
          <img id="raffleImage" alt="Premio de la rifa" loading="lazy" />
        </div>

        <div class="progress-wrap">
          <div class="progress-track">
            <div id="progressBar" class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
          </div>
          <small id="progressText"></small>
        </div>
      </div>

      <div class="product-right">
        <h3>Elige tu pack</h3>
        <div class="pack-grid">
          <button class="pack" data-q="2" type="button">
            <span>2 Tiquetes</span>
            <b id="pack2">$0</b>
            <em>Comprar</em>
          </button>
          <button class="pack popular" data-q="5" type="button">
            <span>5 Tiquetes</span>
            <b id="pack5">$0</b>
            <em>Comprar</em>
            <label>Popular</label>
          </button>
          <button class="pack" data-q="10" type="button">
            <span>10 Tiquetes</span>
            <b id="pack10">$0</b>
            <em>Comprar</em>
          </button>
          <button class="pack" data-q="100" type="button">
            <span>100 Tiquetes</span>
            <b id="pack100">$0</b>
            <em>Comprar</em>
          </button>
        </div>

        <div class="actions">
          <input id="search" placeholder="Buscar numero (0001)" maxlength="4" aria-label="Buscar numero" />
          <input id="jumpTo" placeholder="Ir a numero" maxlength="4" aria-label="Ir a numero" />
          <button id="jumpBtn" type="button">Ir</button>
        </div>
        <div class="actions">
          <input id="rangeFrom" placeholder="Desde" maxlength="4" aria-label="Rango desde" />
          <input id="rangeTo" placeholder="Hasta" maxlength="4" aria-label="Rango hasta" />
          <button id="rangeBtn" type="button">Rango</button>
          <button id="random10" type="button">Aleatorio x10</button>
        </div>

        <div class="grid-toolbar">
          <button id="prevPage" type="button" aria-label="Pagina anterior">&#8592;</button>
          <span id="pageInfo"></span>
          <button id="nextPage" type="button" aria-label="Pagina siguiente">&#8594;</button>
        </div>

        <div id="grid" class="grid" role="grid" aria-label="Seleccionar numeros"></div>
        <p id="selInfo"></p>
      </div>
    </section>

    <!-- CHECKOUT -->
    <section class="panel">
      <h2><span class="section-icon green">💳</span>Finalizar compra</h2>
      <form id="checkout" autocomplete="on">
        <input name="document" placeholder="Numero de documento" required aria-label="Documento" />
        <input name="first_name" placeholder="Nombre" required aria-label="Nombre" autocomplete="given-name" />
        <input name="last_name" placeholder="Apellido" required aria-label="Apellido" autocomplete="family-name" />
        <input type="email" name="email" placeholder="Correo electronico" required aria-label="Correo" autocomplete="email" />
        <input name="phone" placeholder="Numero de celular" required aria-label="Celular" autocomplete="tel" />
        <input name="city" placeholder="Ciudad (opcional)" aria-label="Ciudad" />
        <button type="submit">Confirmar y pagar</button>
      </form>
      <p id="msg"></p>
    </section>

    <!-- LOOKUP -->
    <section class="panel">
      <h2><span class="section-icon blue">🔍</span>Consulta tus entradas</h2>
      <div class="actions">
        <input id="lookup" placeholder="Busca por correo o documento" aria-label="Consultar entradas" />
        <button id="lookupBtn" type="button">Consultar</button>
      </div>
      <ul id="lookupOut" role="list"></ul>
    </section>

    <!-- WINNERS -->
    <section class="panel">
      <h2><span class="section-icon gold">🏆</span>Ganadores publicados</h2>
      <div id="winners" class="winners" role="list"></div>
    </section>
  </main>

  <!-- STICKY CART -->
  <div class="sticky-cart" id="stickyCart" role="status" aria-live="polite">
    <span id="stickyInfo">0 seleccionados</span>
    <button id="stickyCheckout" type="button">Ir a checkout</button>
  </div>

  <script src="/public.js"></script>
</body>
</html>
