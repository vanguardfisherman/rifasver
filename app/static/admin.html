<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060a13" />
  <title>Admin - Plataforma de Rifas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>⚙️ Panel de Administracion</h1>
      <p>Gestion de rifas y ordenes</p>
    </div>
    <nav>
      <a href="/">← Volver al sitio</a>
    </nav>
  </header>

  <main>
    <!-- LOGIN -->
    <section class="panel">
      <h2><span class="section-icon blue">🔐</span>Acceso administrador</h2>
      <form id="adminLogin" autocomplete="on">
        <input name="username" placeholder="Usuario" required aria-label="Usuario administrador" autocomplete="username" />
        <input type="password" name="password" placeholder="Contrasena" required aria-label="Contrasena" autocomplete="current-password" />
        <button type="submit">Ingresar</button>
      </form>
      <p id="adminMsg"></p>
    </section>

    <!-- ADMIN AREA -->
    <section id="adminArea" class="panel hidden">
      <h2><span class="section-icon blue">🎟</span>Rifa seleccionada</h2>
      <select id="raffleSelect" aria-label="Seleccionar rifa"></select>

      <div class="admin-section">
        <h3><span class="sub-icon">✏️</span>Editar rifa</h3>
        <form id="editRaffle">
          <input name="title" placeholder="Titulo de la rifa" required aria-label="Titulo de la rifa" />
          <input name="main_prize" placeholder="Premio principal" required aria-label="Premio principal" />
          <input name="total_numbers" type="number" placeholder="Total de numeros" required aria-label="Total numeros" />
          <input name="ticket_price" type="number" placeholder="Precio por numero ($)" required aria-label="Precio" />
          <input name="min_purchase" type="number" placeholder="Minimo de compra" required aria-label="Minimo compra" />
          <select name="status" aria-label="Estado de la rifa">
            <option value="active">Activa</option>
            <option value="closed">Cerrada</option>
          </select>
          <button type="submit">Guardar cambios</button>
        </form>
      </div>

      <div class="admin-section">
        <h3><span class="sub-icon">🎁</span>Subpremios</h3>
        <form id="subprizesForm">
          <textarea id="subprizesInput" rows="5" placeholder="Uno por linea: Nombre|Descripcion&#10;Ej: 2do premio|Bicicleta electrica" aria-label="Subpremios"></textarea>
          <button type="submit">Guardar subpremios</button>
        </form>
      </div>

      <div class="admin-section">
        <h3><span class="sub-icon">🏆</span>Publicar ganadores</h3>
        <form id="winnersForm">
          <input name="main" placeholder="Numero ganador principal (ej: 0042)" maxlength="4" aria-label="Numero ganador principal" />
          <input name="sub" placeholder="Numero subpremio (ej: 0123)" maxlength="4" aria-label="Numero subpremio" />
          <button type="submit">Publicar ganadores</button>
        </form>
      </div>

      <div class="admin-section">
        <h3><span class="sub-icon">⚙️</span>Configuración del sitio</h3>
        <form id="settingsForm">
          <input name="whatsapp" placeholder="Número WhatsApp (ej: 573001234567)" aria-label="Número WhatsApp" />
          <input name="email" placeholder="Correo de soporte (ej: soporte@tuempresa.com)" aria-label="Email de soporte" />
          <label style="font-size:13px;color:var(--text-secondary);font-weight:600;">Avisos del ticker (uno por línea):</label>
          <textarea id="tickerItemsInput" name="ticker_items" rows="5" placeholder="🎟 ¡Gran Rifa en curso!&#10;🏆 Premios increíbles te esperan" aria-label="Avisos del ticker"></textarea>
          <button type="submit">Guardar configuración</button>
        </form>
      </div>

      <div class="admin-section">
        <h3><span class="sub-icon">📋</span>Todas las órdenes</h3>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
          <button id="refreshOrders" type="button">Actualizar</button>
          <span id="ordersCount" style="font-size:13px;color:var(--text-muted)"></span>
        </div>
        <div id="ordersOut" style="display:flex;flex-direction:column;gap:6px;"></div>
      </div>

      <div class="admin-section">
        <h3><span class="sub-icon">📊</span>Auditoria</h3>
        <button id="loadAudit" type="button">Cargar auditoria</button>
        <ul id="auditOut" role="list" style="margin-top:12px"></ul>
      </div>

      <div class="admin-section">
        <h3><span class="sub-icon">🗄️</span>Base de datos</h3>

        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
          <select id="dbTableSelect" style="flex:1;min-width:160px" aria-label="Seleccionar tabla">
            <option value="">— Selecciona una tabla —</option>
          </select>
          <button id="dbLoadTableBtn" type="button">Ver tabla</button>
        </div>

        <div id="dbTablePager" style="display:none;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
          <button id="dbPrevPage" type="button">← Anterior</button>
          <span id="dbPageInfo" style="font-size:13px;color:var(--text-muted)"></span>
          <button id="dbNextPage" type="button">Siguiente →</button>
        </div>

        <div id="dbTableOut" style="overflow-x:auto;margin-bottom:20px;max-height:420px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);"></div>

        <label style="font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.08em;">Editor SQL</label>
        <textarea id="dbQueryInput" rows="5" placeholder="SELECT * FROM orders LIMIT 10;&#10;&#10;-- INSERT, UPDATE, DELETE también son válidos" style="font-family:'Courier New',monospace;font-size:13px;margin-top:8px;" aria-label="Editor SQL"></textarea>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;">
          <button id="dbRunQueryBtn" type="button">▶ Ejecutar</button>
          <button id="dbClearQueryBtn" type="button" style="background:var(--surface-raised);color:var(--text-secondary);box-shadow:none;border:1px solid var(--border);">Limpiar</button>
          <span id="dbQueryMsg" style="font-size:13px;color:var(--text-muted);flex:1;"></span>
        </div>
        <div id="dbQueryOut" style="overflow-x:auto;margin-top:12px;max-height:360px;overflow-y:auto;border-radius:var(--radius-sm);"></div>
      </div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
